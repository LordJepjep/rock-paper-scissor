<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <h1>Rock, Paper, Scissor!</h1>
      <div class="score-board">
        <div class="score-container player-score">
          <p class="name">You</p>
          <p class="score">0</p>
        </div>
        <div class="score-container tie-score">
          <p class="name">Ties</p>
          <p class="score">0</p>
        </div>
        <div class="score-container computer-score">
          <p class="name">Computer</p>
          <p class="score">0</p>
        </div>
      </div>
      <div class="result-container">
        <h2 class="result"></h2>
        <div class="choices">
          <div class="player-result">
            <p class="selected-choice"></p>
            <p>You</p>
          </div>
          <p>VS.</p>
          <div class="computer-result">
            <p class="selected-choice"></p>
            <p>Computer</p>
          </div>
        </div>
      </div>
      <p>Choose your action!</p>
      <div class="buttons">
        <a class="button" id="rock">🪨</a>
        <a class="button" id="paper">📝</a>
        <a class="button" id="scissor">✂️</a>
      </div>
      <a class="reset-button">Reset</a>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
