<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="main">
      <div class="result-container">
        <div class="result"></div>
        <div class="choices">
            <div class="player-choice">
                You:
            </div>
            <div class="computer-choice">
                Computer:
            </div>
        </div>
        <div class="score-board">
            <div class="player-score">Your Score: 0</div>
            <div class="computer-score">Computer Score: 0</div>
            <div class="tie-score">Ties: 0</div>
        </div>
      </div>
      <div class="buttons">
        <button class="button" id="rock">Rock</button>
        <button class="button" id="paper">Paper</button>
        <button class="button" id="scissor">Scissor</button>
        <button class="reset-button">Reset</button>
      </div>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
